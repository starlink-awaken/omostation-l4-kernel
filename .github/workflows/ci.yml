name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check src/
      - name: Ruff format check
        run: uv run ruff format src/ --check

  test:
    # 2026-07-02: 加 macOS 矩阵 — test_check_process(launchd) 仅 darwin 运行(已加 skipif),
    # Linux 腿验证可移植性, macOS 腿保住 launchd 用例覆盖
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

# L4 Kernel Interface Registry

project: l4-kernel
layer: L4
description: 自我层管理面 — 27域统一注册 + KEMS六面操作 + 健康聚合

cli:
  - name: l4-kernel
    module: l4_kernel.cli:main
    description: L4 域管理 CLI (domain/kems/cards/health)

mcp:
  - port: 7456
    name: l4-kernel-mcp-sse
    module: l4_kernel.mcp_server:run_sse
    protocol: SSE (stdio fallback)
    description: L4 自我层 MCP SSE 端点(给上层 Agent 跨域信号总线访问)
    owner: l4-kernel
    enforcement: env-only   # 默认 7456 但生产用 L4_KERNEL_MCP_PORT env 覆盖

http: []

dependencies:
  runtime: [pyyaml]
  dev: [pytest, ruff]

tests: 16  # tests/ 目录下 16 个测试文件，数量随开发变化，以 CI 为准
